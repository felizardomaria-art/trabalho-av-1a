<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineExperience | Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header role="banner">
        <nav aria-label="Menu Principal">
            <div class="logo">CineExperience</div>
            <div class="accessibility-controls">
                <button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button>
                <button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button>
                <button onclick="toggleContrast()" aria-label="Alternar Alto Contraste">🌓</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" aria-label="Destaques">
            <div class="carousel-container" id="main-carousel">
                </div>
        </section>

        <section id="movies" aria-labelledby="movies-title">
            <h2 id="movies-title">Lançamentos da Semana</h2>
            <div class="movie-grid" id="movie-grid">
                </div>
        </section>

        <section id="faq" aria-labelledby="faq-title">
            <h2 id="faq-title">Dúvidas Frequentes</h2>
            <div id="faq-container">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2023 CineExperience. Desenvolvido com foco em acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
